<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Example of CSS3 rotate() Method</title>
<style>
    img {
	
			transform: rotate(30deg);  /* Modern Browsers */    
	}
    .box{
        margin: 50px;
        width:120px;
        height:110px;
        background: url("images/star-fish-transparent.jpeg") no-repeat;
    }
</style>
</head>
<body>
    <div class="box">
    	<img src="images/star-fish.jpeg" alt="Star Fish">
    </div>
</body>
</html>
