<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1, initial-scale=1.0">
    <title>Cool image</title>
    <style>
        body{
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            margin: 50px;
        }
        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }
        img{
            width:200px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition:transform 0.5s ease-in-out;
        }
        /*floating effect*/
        .float:hover{
        transform: translate(-25px);
        }
        /*blur to focus effect*/
        .blur:hover{
            filter:blur(5px);
        }
        /*flip effect*/
        .flip:hover {
            transform: rotate(180deg);
        }
        /*pulsing effect*/
        .pulsing {
            animation: pulsing 0.1s infinite alternate;
        }
        @keyframes pulsing{
            0% {transform: scale(1);opacity: 1;}
            100%{transform:scale(1.1);opacity:0.8;}
        }
        
            /*shake effect*/
        .shake:hover {
            animation: shake 0.3s infinite;
        }
        @keyframes shake{
            0%,100%{transform:translateX(0);}
            25%{transform: translateX(-5px);}
            50%{transform: translateX(5px);}
            75%{transform: translateX(-5px);}
        }
              /*spin effect*/
        .spin:hover {
            transform: rotate(360deg);
        }  /*skew effect*/
        .skew:hover {
            transform: skew(180deg);
        }
        </style>
 </head>
    <body>
<h1>Awsome image</h1>
<div class="container">
    <div>
        <h2>1.Floating effect</h2>
        <img src="https://images5.alphacoders.com/127/1276272.jpg"alt="Floating Image"class="float">
    </div>
    <div>
        <h2>2. Flip effect</h2>
        <img src="https://images5.alphacoders.com/127/1276272.jpg"alt="Flip Image"class="Flip">
    </div>
    <div>
        <h2>3.Blur to focus</h2>
        <img src="https://images5.alphacoders.com/127/1276272.jpg"alt="Blur Image"class="blur">
    </div>
    <h2>4.pulsing Effect</h2>
        <img src="https://images5.alphacoders.com/127/1276272.jpg"alt="pulseImage"class="pulse">
    </div>
    <h2>5.shake effect</h2>
        <img src="https://images5.alphacoders.com/127/1276272.jpg"alt="shake Image"class="shake">
    </div>
    <h2>6.spin effect</h2>
        <img src="https://images5.alphacoders.com/127/1276272.jpg"alt=" spin Image"class="spin">
    </div>
    <h2>7.skew effect</h2>
        <img src="https://images5.alphacoders.com/127/1276272.jpg"alt=" tilt Image"class="tili">
    </div>
</div>
    </body>
    </html>
